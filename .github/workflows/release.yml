name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Validate tag matches package version
        run: |
          PACKAGE_VERSION="$(node -p "JSON.parse(require('fs').readFileSync('package.json', 'utf8')).version")"
          if [ "v${PACKAGE_VERSION}" != "${GITHUB_REF_NAME}" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match package.json version v${PACKAGE_VERSION}"
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Run checks
        run: npm run check

      - name: Build package
        run: npm run build

      - name: Pack npm tarball
        id: pack
        run: |
          PACK_JSON="$(npm pack --json)"
          TARBALL="$(node -e 'const data = JSON.parse(process.argv[1]); console.log(data[0].filename);' "$PACK_JSON")"
          echo "tarball=${TARBALL}" >> "$GITHUB_OUTPUT"

      - name: Publish to npm
        run: npm publish --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" "${{ steps.pack.outputs.tarball }}" \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes
